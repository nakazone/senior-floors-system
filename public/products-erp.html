<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products (ERP) — Senior Floors CRM</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-[#1a2036] text-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap justify-between gap-3">
      <h1 class="text-lg font-bold">Products &amp; margins</h1>
      <div class="flex flex-wrap gap-2">
        <a href="quote-builder.html" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm">Quote builder</a>
        <a href="suppliers.html" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm">Suppliers</a>
        <a href="dashboard.html?page=quotes" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm">Dashboard</a>
      </div>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
    <p id="authMsg" class="text-red-600 text-sm hidden"></p>

    <section class="bg-white rounded-xl border shadow-sm p-6 space-y-3">
      <h2 class="text-sm font-bold text-slate-800">Default margin by category</h2>
      <p class="text-xs text-slate-500">Used when adding a product to a quote (can override per line).</p>
      <div id="marginsList" class="grid sm:grid-cols-2 gap-3 text-sm"></div>
    </section>

    <section class="bg-white rounded-xl border shadow-sm p-6 space-y-4">
      <div class="flex flex-wrap gap-3 items-end">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Supplier</label>
          <select id="filterSupplier" class="border rounded-lg px-3 py-2 text-sm min-w-[200px]"></select>
        </div>
        <div class="flex-1 min-w-[160px]">
          <label class="block text-xs font-semibold text-slate-500 mb-1">Search</label>
          <input type="search" id="filterQ" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="Name / SKU" />
        </div>
        <label class="inline-flex items-center gap-2 text-sm"><input type="checkbox" id="showInactive" class="rounded" /> Inactive</label>
        <button type="button" id="btnReload" class="px-4 py-2 rounded-lg bg-slate-100 text-sm font-medium">Refresh</button>
        <button type="button" id="btnNew" class="px-4 py-2 rounded-lg bg-[#1a2036] text-white text-sm font-semibold">+ Product</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-left text-xs text-slate-500 uppercase">
            <tr>
              <th class="px-3 py-2">Supplier</th>
              <th class="px-3 py-2">Name</th>
              <th class="px-3 py-2">Category</th>
              <th class="px-3 py-2">Unit</th>
              <th class="px-3 py-2 text-right">Cost</th>
              <th class="px-3 py-2">SKU</th>
              <th class="px-3 py-2">Active</th>
              <th class="px-3 py-2 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/50">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full p-6 space-y-3 max-h-[90vh] overflow-y-auto">
      <h2 id="modalTitle" class="text-lg font-bold">Product</h2>
      <input type="hidden" id="editId" />
      <div>
        <label class="text-xs font-semibold text-slate-500">Supplier *</label>
        <select id="fSupplier" class="w-full border rounded-lg px-3 py-2 text-sm"></select>
      </div>
      <div><label class="text-xs font-semibold text-slate-500">Name *</label><input id="fName" class="w-full border rounded-lg px-3 py-2 text-sm" /></div>
      <div>
        <label class="text-xs font-semibold text-slate-500">Category *</label>
        <select id="fCategory" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="Hardwood">Hardwood</option>
          <option value="LVP">LVP</option>
          <option value="Engineered">Engineered</option>
          <option value="Accessories">Accessories</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500">Unit *</label>
        <select id="fUnit" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="sq_ft">Sq Ft</option>
          <option value="box">Box</option>
          <option value="piece">Piece</option>
        </select>
      </div>
      <div><label class="text-xs font-semibold text-slate-500">Cost price *</label><input id="fCost" type="number" step="0.0001" min="0" class="w-full border rounded-lg px-3 py-2 text-sm" /></div>
      <div><label class="text-xs font-semibold text-slate-500">SKU</label><input id="fSku" class="w-full border rounded-lg px-3 py-2 text-sm" /></div>
      <div><label class="text-xs font-semibold text-slate-500">Description</label><textarea id="fDesc" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea></div>
      <div><label class="text-xs font-semibold text-slate-500">Stock (optional)</label><input id="fStock" type="number" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="Leave empty" /></div>
      <div id="activeWrap" class="hidden"><label class="inline-flex gap-2 text-sm"><input type="checkbox" id="fActive" checked /> Active</label></div>
      <p id="formError" class="text-red-600 text-sm hidden"></p>
      <div class="flex justify-end gap-2">
        <button type="button" id="btnCancel" class="px-4 py-2 border rounded-lg text-sm">Cancel</button>
        <button type="button" id="btnSave" class="px-4 py-2 rounded-lg bg-[#d6b598] text-[#1a2036] text-sm font-bold">Save</button>
      </div>
    </div>
  </div>
  <script src="products-erp.js?v=1"></script>
</body>
</html>
