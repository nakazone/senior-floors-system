<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set new password — Builder Portal</title>
  <link rel="stylesheet" href="css/builders-portal.css" />
</head>
<body class="bp-login-page">
  <div class="bp-login-box">
    <h1>New password</h1>
    <form id="resetForm">
      <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">New password (8+ characters)</label>
      <input type="password" id="password" required minlength="8" style="width:100%;padding:10px;border:1px solid var(--bp-border);border-radius:8px;margin-bottom:12px;box-sizing:border-box" />
      <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Confirm password</label>
      <input type="password" id="password2" required minlength="8" style="width:100%;padding:10px;border:1px solid var(--bp-border);border-radius:8px;margin-bottom:12px;box-sizing:border-box" />
      <p id="resetMsg" style="font-size:13px;display:none"></p>
      <button type="submit" class="bp-btn-tan" style="width:100%">Update password</button>
    </form>
    <p style="margin-top:16px;font-size:13px"><a href="builder-login.html">Back to login</a></p>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    if (!token) {
      document.getElementById('resetMsg').textContent = 'Invalid reset link.';
      document.getElementById('resetMsg').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    }
    document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      const msg = document.getElementById('resetMsg');
      msg.style.display = 'block';
      if (p1 !== p2) {
        msg.style.color = '#dc2626';
        msg.textContent = 'Passwords do not match';
        return;
      }
      const r = await fetch('/api/builder-auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: p1 }),
      });
      const j = await r.json();
      msg.style.color = r.ok ? '#16a34a' : '#dc2626';
      msg.textContent = j.message || j.error || 'Done';
      if (r.ok) setTimeout(() => { location.href = 'builder-login.html?reset=1'; }, 1500);
    });
  </script>
</body>
</html>
