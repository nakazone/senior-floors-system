<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="styles.css" />

<body class="dashboard-app-body pd-body payroll-sidebar-page project-detail-page">

    <div class="mobile-app-header__brand">

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <aside class="dashboard-sidebar sf-sidebar" id="dashboardSidebar" aria-label="Menu lateral CRM">
      <div class="sidebar-header">
        <img src="/assets/SeniorFloors.png" alt="Senior Floors" class="sidebar-brand-logo logo-image" width="104" height="104" onerror="this.style.display='none'" />
      </div>

      <nav class="sidebar-nav" aria-label="Principal">
        <div class="sidebar-nav-group">

            Dashboard
          </a>
        </div>
        <div class="sidebar-nav-group">
          <p class="sidebar-nav-group-label">Comercial</p>
          <a href="marketing.html" class="nav-item" data-crm-permission="reports.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M3 11v2a1 1 0 001 1h2l4 9V4L6 11H4a1 1 0 00-1 1z"/><path d="M16 9a4 4 0 010 8"/><path d="M19 6a8 8 0 010 12"/></svg>

          <a href="dashboard.html?page=leads" class="nav-item" data-crm-permission="leads.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><path d="M9 5a2 2 0 012-2h2a2 2 0 012 2v0a2 2 0 01-2 2H9a2 2 0 01-2-2v0z"/><path d="M9 12h6"/><path d="M9 16h6"/></svg>
            Leads

          <a href="dashboard.html?page=crm" class="nav-item" data-crm-permission="pipeline.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            CRM
          </a>
          <a href="dashboard.html?page=customers" class="nav-item" data-crm-permission="customers.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            Clients
          </a>
        </div>
        <div class="sidebar-nav-group">
          <p class="sidebar-nav-group-label">Operações</p>
          <a href="dashboard.html?page=quotes" class="nav-item" data-crm-permission="quotes.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
            Quotes
          </a>
          <a href="dashboard.html?page=schedule" class="nav-item" data-crm-permission="visits.view">

            Schedule
          </a>
          <a href="projects.html" class="nav-item active" data-crm-permission="projects.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/><path d="M5 3l4 4"/></svg>
            Projetos
          </a>
        </div>
        <div class="sidebar-nav-group">
          <p class="sidebar-nav-group-label">Financeiro &amp; registo</p>
          <a href="financial.html" class="nav-item" data-crm-permission="contracts.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            Financeiro

            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            Folha de pagamento
          </a>
          <a href="dashboard.html?page=activities" class="nav-item" data-crm-permission="activities.view">

            Activities
          </a>
        </div>
        <div class="sidebar-nav-group">
          <p class="sidebar-nav-group-label">Sistema</p>
          <a href="dashboard.html?page=users" class="nav-item" data-crm-permission="users.view">
            <svg class="nav-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Users
          </a>

      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user-bar">
          <div class="sidebar-user-bar__avatar" id="sidebarUserAvatar" aria-hidden="true">—</div>
          <div class="sidebar-user-bar__text">
            <span class="sidebar-user-bar__name" id="sidebarUserName">—</span>
            <span class="sidebar-user-bar__role" id="sidebarUserRole"></span>
          </div>
          <button type="button" id="logoutBtn" class="sidebar-logout-btn" title="Sair" aria-label="Terminar sessão">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="dashboard-main pd-main sf-main-content" id="pdMain">
      <header class="pd-topbar">
        <div class="pd-topbar-left">
          <div class="pd-breadcrumb">
            <a href="projects.html" class="pd-breadcrumb-link">Projetos</a>
            <span class="pd-breadcrumb-sep">/</span>
            <span id="pd-crumb-name">Detalhe</span>
          </div>
          <div class="pd-title-row">
            <h1 class="pd-title" id="pd-title">—</h1>
            <span class="pd-number" id="pd-number">—</span>
            <span class="pd-client-type" id="pd-client-type"></span>
          </div>
        </div>
        <div class="pd-topbar-right">
          <div class="pd-status-dropdown pd-status-select-wrap" id="pd-status-wrap">
            <label class="visually-hidden" for="pd-status">Status</label>
            <select id="pd-status" class="pd-status-select" aria-label="Status do projeto"></select>
          </div>
          <button type="button" class="pd-action-btn" id="btn-sync-payroll">🔄 Payroll</button>
          <button type="button" class="pd-action-btn pd-action-filled" id="btn-tab-gallery">📷 Galeria</button>
          <button type="button" class="pd-action-btn pd-action-publish" id="btn-pd-publish">🌐 Publicar</button>
        </div>
      </header>

      <div class="pd-progress-strip">
        <span class="pd-prog-label">Progresso da obra</span>
        <div class="pd-prog-track">
          <div class="pd-prog-fill" id="pd-progress-fill" style="width:0%"></div>
        </div>
        <input type="number" class="pd-prog-input" id="pd-pct" min="0" max="100" value="0" title="Editar progresso" />
        <span class="pd-prog-pct-label">%</span>
        <span class="pd-prog-dates" id="pd-prog-dates"></span>
      </div>

      <div class="pd-schedule-bar" id="pd-schedule-bar">
        <span class="pd-prog-label">Cronograma</span>
        <label class="pd-date-lab"
          >Início
          <input type="date" id="pd-date-start" class="pd-date-input" autocomplete="off" />
        </label>
        <label class="pd-date-lab"
          >Término previsto
          <input type="date" id="pd-date-end" class="pd-date-input" autocomplete="off" />
        </label>
        <button type="button" class="pd-action-btn pd-action-filled" id="pd-dates-save">Guardar datas</button>
      </div>

      <nav class="pd-tabs" role="tablist" aria-label="Secções do projeto">
        <button type="button" class="tab-btn pd-tab active" data-tab="overview" role="tab" aria-selected="true">Visão Geral</button>
        <button type="button" class="tab-btn pd-tab" data-tab="costs" role="tab">Custos</button>
        <button type="button" class="tab-btn pd-tab" data-tab="checklist" role="tab">Checklist</button>
        <button type="button" class="tab-btn pd-tab" data-tab="gallery" role="tab">Galeria &amp; Portfólio</button>
        <button type="button" class="tab-btn pd-tab" data-tab="builder" role="tab" id="tab-btn-builder" style="display:none">Builder</button>
      </nav>

      <!-- Conteúdo das abas é injetado por project-detail.js (innerHTML). -->
      <div id="tab-overview" class="tab-pane pd-tab-pane" style="display:flex"></div>
      <div id="tab-costs" class="tab-pane pd-tab-pane" style="display:none"></div>
      <div id="tab-checklist" class="tab-pane pd-tab-pane" style="display:none"></div>
      <div id="tab-gallery" class="tab-pane pd-tab-pane" style="display:none"></div>
      <div id="tab-builder" class="tab-pane pd-tab-pane" style="display:none"></div>
    </main>
  </div>

  <input type="file" id="pd-file-input" accept="image/jpeg,image/png,image/webp,image/heic,image/heif,.heic,.heif" capture="environment" style="position:fixed;left:-9999px;width:1px;height:1px;opacity:0" />

  <script src="project-detail.js?v=7"></script>
  <script>
    (function () {
      var t = document.getElementById('mobileMenuToggle');
      var s = document.getElementById('dashboardSidebar');
      var o = document.getElementById('mobileOverlay');
      if (t && s && o) {
        t.addEventListener('click', function () {
          var open = s.classList.toggle('mobile-open');
          o.classList.toggle('active', open);
          t.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        o.addEventListener('click', function () {
          s.classList.remove('mobile-open');
          o.classList.remove('active');
          t.setAttribute('aria-expanded', 'false');
        });
      }
      document.getElementById('logoutBtn')?.addEventListener('click', async function () {
        try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
        window.location.href = 'login.html';
      });
    })();
  </script>
</body>
</html>
