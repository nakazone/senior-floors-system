<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard - Senior Floors Builder Portal</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <link rel="stylesheet" href="css/builders-portal.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="bp-page-body" data-bp-page="dashboard">
  <div class="bp-portal-layout">
    <button type="button" class="bp-menu-toggle" id="bpMenuToggle" aria-label="Menu">&#9776;</button>
    <aside class="bp-portal-sidebar">
      <img src="/assets/SeniorFloors.png" alt="" width="48" style="margin-bottom:16px" onerror="this.style.display='none'" />
      <nav id="bpPortalNav"></nav>
    </aside>
    <main class="bp-portal-main">
      <div id="bpPortalHeader"></div>
      <div id="docAlert" class="hidden"></div>
      <div class="bp-card bp-welcome" id="welcomeCard">
        <div id="firstVisitBanner" class="bp-first-visit hidden"></div>
        <div class="bp-welcome__main">
          <div>
            <h1 class="bp-welcome__title" id="welcomeTitle">Welcome</h1>
            <p class="bp-welcome__sub" id="welcomeSub">Here is an overview of your projects with Senior Floors.</p>
            <a href="builder-estimate-request.html" class="bp-btn-tan bp-welcome__cta">Request new project estimate</a>
          </div>
          <div id="welcomeManager" class="bp-welcome__manager hidden"></div>
        </div>
      </div>
      <div id="nextVisitCard" class="hidden"></div>
      <div class="bp-metrics" style="margin-top:1rem">
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricActive">0</div><div class="bp-metric__lbl">Active projects</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricTotal">0</div><div class="bp-metric__lbl">Total projects</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricUnread">0</div><div class="bp-metric__lbl">Unread</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricSqft">0</div><div class="bp-metric__lbl">Sq ft completed</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricValue">$0</div><div class="bp-metric__lbl">Completed value</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricYear">0</div><div class="bp-metric__lbl">Completed this year</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricCompleted">0</div><div class="bp-metric__lbl">Total completed projects</div></div>
      </div>
      <div class="bp-dashboard-grid">
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin:1rem 0 0.5rem;flex-wrap:wrap;gap:8px">
            <h2 class="bp-title" style="font-size:1rem;margin:0">Projects in progress</h2>
            <a href="builder-projects.html" class="bp-btn-tan" style="text-decoration:none;font-size:13px">View all</a>
          </div>
          <div id="projectCards"></div>
        </div>
        <div>
          <h2 class="bp-title" style="font-size:1rem;margin:1rem 0 0.5rem">Recent activity <span id="activitySinceHint" class="bp-muted" style="font-weight:400;font-size:12px"></span></h2>
          <div id="activityFeed" class="bp-card"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="builder-auth.js?v=3"></script>
  <script src="builder-portal-nav.js?v=2"></script>
  <script src="builder-portal-common.js?v=2"></script>
  <script src="builder-portal.js?v=7"></script>
</body>
</html>
