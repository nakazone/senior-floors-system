<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard — Senior Floors Builder Portal</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <link rel="stylesheet" href="css/builders-portal.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="bp-page-body">
  <div class="bp-portal-layout">
    <aside class="bp-portal-sidebar">
      <img src="/assets/SeniorFloors.png" alt="" width="48" style="margin-bottom:16px" onerror="this.style.display='none'" />
      <p id="portalUserName" style="font-weight:600;margin:0 0 4px;color:var(--bp-tan)">—</p>
      <p id="portalUserCo" style="font-size:12px;opacity:0.8;margin:0 0 20px">—</p>
      <nav>
        <a href="builder-portal.html" class="active">Dashboard</a>
        <a href="builder-portal.html">My Projects</a>
        <a href="builder-calculator.html">Calculator</a>
        <a href="builder-estimate-request.html">Request estimate</a>
        <a href="builder-pricing.html">Pricing</a>
        <a href="builder-gallery.html">Gallery</a>
        <a href="builder-messages.html">Messages</a>
        <a href="builder-history.html">History</a>
        <a href="builder-referrals.html">Referrals</a>
      </nav>
      <button type="button" id="btnLogout" style="margin-top:24px;background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;width:100%">Sign out</button>
    </aside>
    <main class="bp-portal-main">
      <div class="bp-card" style="background:var(--bp-navy);color:#fff;border:none">
        <h1 class="bp-title" style="color:#fff;font-size:1.25rem" id="welcomeTitle">Welcome</h1>
        <p style="opacity:0.9;margin:0 0 12px">Here is an overview of your projects with Senior Floors.</p>
        <a href="builder-estimate-request.html" class="bp-btn-tan" style="text-decoration:none;display:inline-block">Request new project estimate</a>
      </div>
      <div class="bp-metrics" style="margin-top:1rem">
        <div class="bp-card bp-metric"><div class="bp-metric__val" id="metricActive">0</div><div class="bp-metric__lbl">Active projects</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val">—</div><div class="bp-metric__lbl">Next visit</div></div>
        <div class="bp-card bp-metric"><div class="bp-metric__val">0</div><div class="bp-metric__lbl">Unread messages</div></div>
      </div>
      <h2 class="bp-title" style="font-size:1rem;margin:1rem 0 0.5rem">Projects in progress</h2>
      <div id="projectCards"></div>
    </main>
  </div>
  <script src="builder-auth.js?v=2"></script>
  <script src="builder-portal.js?v=2"></script>
</body>
</html>
