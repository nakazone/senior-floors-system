<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects - Builder Portal</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <link rel="stylesheet" href="css/builders-portal.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="bp-page-body" data-bp-page="projects">
  <div class="bp-portal-layout">
    <aside class="bp-portal-sidebar">
      <img src="/assets/SeniorFloors.png" alt="" width="48" style="margin-bottom:16px" onerror="this.style.display='none'" />
      <p id="portalUserName" style="font-weight:600;margin:0 0 4px;color:var(--bp-tan)">-</p>
      <p id="portalUserCo" style="font-size:12px;opacity:0.8;margin:0 0 20px">-</p>
      <nav id="bpPortalNav"></nav>
      <button type="button" id="btnLogout" style="margin-top:24px;background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;width:100%">Sign out</button>
    </aside>
    <main class="bp-portal-main">
      <h1 class="bp-title">My Projects</h1>
      <p class="bp-muted" style="margin:0 0 1rem">Track all your jobs with Senior Floors.</p>
      <div class="bp-filters" style="margin-bottom:1rem;display:flex;gap:8px;flex-wrap:wrap">
        <button type="button" class="bp-btn-tan bp-filter-btn active" data-filter="active">Active</button>
        <button type="button" class="btn btn-secondary bp-filter-btn" data-filter="all">All</button>
        <button type="button" class="btn btn-secondary bp-filter-btn" data-filter="completed">Completed</button>
      </div>
      <div id="projectsHost"><p class="bp-card">Loading projects...</p></div>
    </main>
  </div>
  <script src="builder-auth.js?v=2"></script>
  <script src="builder-portal-nav.js?v=1"></script>
  <script src="builder-projects.js?v=1"></script>
</body>
</html>
