<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppliers — Senior Floors CRM</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { corePlugins: { preflight: false } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="crm-shared-nav.css" />
  <link rel="stylesheet" href="design-system.css" />
  <link rel="stylesheet" href="crm-toast.css" />
  <style>body { font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body class="crm-standalone-page bg-slate-50 text-slate-900 min-h-screen">
  <div id="crmSharedNavRoot"></div>
  <main class="max-w-5xl mx-auto px-4 py-8 space-y-4">
    <h1 class="text-xl font-bold text-slate-900 border-b border-slate-200 pb-3">Suppliers</h1>
    <p id="authMsg" class="text-red-600 text-sm hidden"></p>
    <div class="flex justify-between items-center flex-wrap gap-2">
      <label class="inline-flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" id="showInactive" class="rounded" /> Show inactive</label>
      <button type="button" id="btnNew" class="btn btn-primary">+ Supplier</button>
    </div>
    <div class="bg-white rounded-xl border shadow-sm overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-left text-xs text-slate-500 uppercase">
          <tr>
            <th class="px-4 py-3">Name</th>
            <th class="px-4 py-3">Contact</th>
            <th class="px-4 py-3">Phone</th>
            <th class="px-4 py-3">Email</th>
            <th class="px-4 py-3">Active</th>
            <th class="px-4 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/50">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full p-6 space-y-3 max-h-[90vh] overflow-y-auto">
      <h2 id="modalTitle" class="text-lg font-bold">Supplier</h2>
      <input type="hidden" id="editId" />
      <div><label class="text-xs font-semibold text-slate-500">Name *</label><input id="fName" class="w-full border rounded-lg px-3 py-2 text-sm" /></div>
      <div><label class="text-xs font-semibold text-slate-500">Contact</label><input id="fContact" class="w-full border rounded-lg px-3 py-2 text-sm" /></div>
      <div><label class="text-xs font-semibold text-slate-500">Phone</label><input id="fPhone" class="w-full border rounded-lg px-3 py-2 text-sm" /></div>
      <div><label class="text-xs font-semibold text-slate-500">Email</label><input id="fEmail" type="email" class="w-full border rounded-lg px-3 py-2 text-sm" /></div>
      <div><label class="text-xs font-semibold text-slate-500">Address</label><textarea id="fAddress" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea></div>
      <div><label class="text-xs font-semibold text-slate-500">Notes</label><textarea id="fNotes" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea></div>
      <div id="activeWrap" class="hidden"><label class="inline-flex gap-2 text-sm"><input type="checkbox" id="fActive" checked /> Active</label></div>
      <p id="formError" class="text-red-600 text-sm hidden"></p>
      <div class="flex justify-end gap-2">
        <button type="button" id="btnCancel" class="btn btn-secondary">Cancel</button>
        <button type="button" id="btnSave" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>
  <script src="crm-toast.js"></script>
  <script src="crm-shared-nav.js?v=6"></script>
  <script src="suppliers.js?v=1"></script>
</body>
</html>
