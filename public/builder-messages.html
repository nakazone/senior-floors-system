<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />

<body class="bp-page-body" data-bp-page="messages">
  <div class="bp-portal-layout">
    <button type="button" class="bp-menu-toggle" id="bpMenuToggle" aria-label="Menu">&#9776;</button>
    <aside class="bp-portal-sidebar"><nav id="bpPortalNav"></nav></aside>

      <div id="bpPortalHeader"></div>
      <h1 class="bp-title">Messages</h1>

            <option value="">All conversations</option>
            <option value="general">General conversations</option>
          </select>
        </label>
      </div>
      <section class="bp-msg-thread bp-card" id="portalThread"></section>
    </main>
  </div>
  <script src="builder-auth.js?v=3"></script>
  <script src="builder-portal-nav.js?v=2"></script>
