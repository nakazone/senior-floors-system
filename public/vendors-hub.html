<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2036" />
  <title>Fornecedores — pagamentos & notas</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="design-system.css" />
  <link rel="stylesheet" href="crm-shared-nav.css?v=9" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .vh-layout { max-width: 1200px; margin: 0 auto; padding: 16px 20px 48px; }
    .vh-hero { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .vh-hero h1 { font-size: 1.35rem; color: var(--sf-navy, #1a2036); margin: 0; }
    .vh-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 900px) {
      .vh-grid { grid-template-columns: 1fr 340px; align-items: start; }
    }
    .vh-panel { background: #fff; border-radius: 12px; padding: 16px 18px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid var(--border-color, #e8e6e1); }
    .vh-panel h2 { font-size: 1rem; color: var(--sf-navy); margin: 0 0 12px; }
    .vh-filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 14px; }
    .vh-filters label { font-size: 12px; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
    .vh-filters select, .vh-filters input[type="number"] { min-width: 160px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border-color); }
    .vh-badge-atraso { background: #fde8e8; color: #a32020; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
    .vh-note-list { list-style: none; padding: 0; margin: 0; max-height: 420px; overflow-y: auto; }
    .vh-note-list li { padding: 10px 0; border-bottom: 1px solid var(--border-color); font-size: 13px; }
    .vh-upload-zone { border: 2px dashed var(--border-color); border-radius: 10px; padding: 14px; margin-top: 10px; }
    .vh-thumb-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .vh-thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid var(--border-color); }
  </style>
</head>
<body class="dashboard-app-body fin-page payroll-sidebar-page">
  <header class="mobile-app-header" id="mobileAppHeader" aria-label="Barra superior">
    <button type="button" class="mobile-app-header__menu" id="mobileMenuToggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="vhSidebar"></button>
    <div class="mobile-app-header__brand">
      <img src="/assets/SeniorFloors.png" alt="" width="28" height="28" onerror="this.style.display='none'" />
      <h1 class="mobile-app-header__title">Fornecedores</h1>
    </div>
  </header>

  <div class="dashboard-container">
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <aside class="dashboard-sidebar sf-sidebar" id="vhSidebar" aria-label="Menu">
      <div class="sidebar-header">
        <img src="/assets/SeniorFloors.png" alt="Senior Floors" class="sidebar-brand-logo logo-image" width="104" height="104" onerror="this.style.display='none'" />
      </div>
      <nav class="sidebar-nav" aria-label="Principal">
        <div id="crmSharedNavRoot" data-layout="sidebar"></div>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user-bar">
          <div class="sidebar-user-bar__avatar" id="sidebarUserAvatar" aria-hidden="true">—</div>
          <div class="sidebar-user-bar__text">
            <span class="sidebar-user-bar__name" id="sidebarUserName">—</span>
            <span class="sidebar-user-bar__role" id="sidebarUserRole"></span>
          </div>
          <button type="button" id="logoutBtn" class="sidebar-logout-btn" title="Sair" aria-label="Terminar sessão">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="dashboard-main" style="flex-direction:column;padding:0;background:#f5f4f1">
      <div class="vh-layout">
        <div class="vh-hero">
          <h1>Próximos pagamentos & notas por fornecedor</h1>
          <a href="financial.html" class="btn btn-sm btn-secondary">← Voltar ao Financeiro</a>
        </div>

        <div class="vh-grid">
          <div class="vh-panel">
            <h2>Próximos pagamentos</h2>
            <div class="vh-filters">
              <label>Horizonte (dias)
                <input type="number" id="vhHorizon" min="7" max="366" value="120" />
              </label>
              <label>Filtrar fornecedor
                <select id="vhFilterVendor"><option value="">Todos</option></select>
              </label>
              <button type="button" class="btn btn-sm btn-primary" id="vhRefreshUpcoming">Atualizar</button>
            </div>
            <div class="fin-table-wrap">
              <table class="fin-table">
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Fornecedor</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Tipo</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="vhUpcomingBody"><tr><td colspan="6" style="color:var(--text-muted)">A carregar…</td></tr></tbody>
              </table>
            </div>
          </div>

          <div class="vh-panel">
            <h2>Notas / ficheiros do fornecedor</h2>
            <label style="font-size:13px;display:block;margin-bottom:8px;color:var(--text-muted)">Escolher fornecedor</label>
            <select id="vhVendorSelect" class="fin-form-full" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border-color)">
              <option value="">— Selecione —</option>
            </select>

            <div class="vh-upload-zone" id="vhUploadZone" style="display:none">
              <p style="margin:0 0 8px;font-size:13px;color:var(--text-muted)">Enviar nota fiscal ou PDF (até 20 MB)</p>
              <input type="text" id="vhMemo" placeholder="Nota / descrição (opcional)" class="fin-form-full" style="width:100%;padding:8px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border-color)" />
              <input type="file" id="vhFile" accept="image/*,.pdf,application/pdf" />
              <button type="button" class="btn btn-sm btn-primary" id="vhUploadBtn" style="margin-top:10px">Enviar ficheiro</button>
            </div>

            <h3 style="font-size:0.9rem;margin:18px 0 8px;color:var(--sf-navy)">Ficheiros guardados</h3>
            <ul class="vh-note-list" id="vhAttachmentsList"><li style="color:var(--text-muted);border:none">Selecione um fornecedor</li></ul>
            <div class="vh-thumb-row" id="vhThumbs"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="fin-modal-backdrop" id="vhLightbox" style="z-index:950">
    <div class="fin-modal" style="max-width:90vw">
      <img id="vhLightboxImg" src="" alt="" style="max-width:100%;height:auto" />
      <button type="button" class="btn btn-secondary" id="vhLightboxClose" style="margin-top:12px">Fechar</button>
    </div>
  </div>

  <script src="crm-shared-nav.js?v=9"></script>
  <script src="vendors-hub.js?v=1"></script>
</body>
</html>
