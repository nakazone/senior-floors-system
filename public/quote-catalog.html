<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de serviços — Orçamentos</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-[#1a2036] text-white shadow">
    <div class="max-w-5xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="text-lg font-bold">Catálogo de serviços</h1>
        <p class="text-xs text-white/70">Linhas pré-definidas para o Quote builder</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <a href="quote-builder.html" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm">Quote builder</a>
        <a href="dashboard.html?page=quotes" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm">Orçamentos</a>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <p id="authMsg" class="text-red-600 text-sm hidden"></p>
    <p id="migrateMsg" class="text-amber-700 text-sm hidden"></p>

    <div class="flex flex-wrap items-center justify-between gap-3">
      <label class="inline-flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
        <input type="checkbox" id="showInactive" class="rounded border-slate-300" />
        Mostrar inativos
      </label>
      <button type="button" id="btnNew" class="px-4 py-2 rounded-lg bg-[#1a2036] text-white text-sm font-semibold">
        + Novo serviço
      </button>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 border-b text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3">Nome</th>
              <th class="px-4 py-3">Categoria</th>
              <th class="px-4 py-3">Unidade</th>
              <th class="px-4 py-3 text-right">Taxa padrão</th>
              <th class="px-4 py-3">Ativo</th>
              <th class="px-4 py-3 text-right">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p id="empty" class="hidden p-8 text-center text-slate-500 text-sm">Nenhum item. Rode a migração do módulo Quotes ou crie um serviço.</p>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/50" aria-modal="true">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6 space-y-4">
      <h2 id="modalTitle" class="text-lg font-bold text-slate-900">Novo serviço</h2>
      <form id="form" class="space-y-3">
        <input type="hidden" id="editId" value="" />
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Nome do serviço *</label>
          <input id="fName" type="text" required maxlength="255" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Ex.: Instalação de LVP — mão de obra" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Categoria *</label>
          <select id="fCategory" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            <option value="Installation">Installation</option>
            <option value="Sand & Finishing">Sand &amp; Finishing</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Unidade *</label>
            <select id="fUnit" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
              <option value="sq_ft">Sq Ft (pé quadrado)</option>
              <option value="linear_ft">Linear Ft (pé linear)</option>
              <option value="inches">Inches</option>
              <option value="fixed">Fixed (preço fixo)</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Taxa padrão (USD) *</label>
            <input id="fRate" type="number" step="0.01" min="0" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="0.00" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Descrição padrão (vai para a linha do orçamento)</label>
          <textarea id="fDesc" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Texto sugerido ao adicionar do catálogo"></textarea>
        </div>
        <div id="fActiveWrap" class="hidden">
          <label class="inline-flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" id="fActive" checked class="rounded border-slate-300" />
            Ativo (aparece no Quote builder)
          </label>
        </div>
        <p id="formError" class="text-red-600 text-sm hidden"></p>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="btnCancel" class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium">Cancelar</button>
          <button type="submit" id="btnSubmit" class="px-4 py-2 rounded-lg bg-[#d6b598] text-[#1a2036] text-sm font-bold">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="quote-catalog.js?v=1"></script>
</body>
</html>
