<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de serviços — Orçamentos</title>
  <link rel="icon" type="image/png" href="/assets/SeniorFloors.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="crm-shared-nav.css" />
  <style>body { font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div id="crmSharedNavRoot"></div>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <div class="border-b border-slate-200 pb-4">
      <h1 class="text-xl font-bold text-slate-900">Catálogo de serviços</h1>
      <p class="text-sm text-slate-500 mt-1">Linhas pré-definidas para Quote</p>
    </div>
    <p id="authMsg" class="text-red-600 text-sm hidden"></p>
    <p id="migrateMsg" class="text-amber-700 text-sm hidden"></p>

    <div class="flex flex-wrap items-center justify-between gap-3">
      <label class="inline-flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
        <input type="checkbox" id="showInactive" class="rounded border-slate-300" />
        Mostrar inativos
      </label>
      <button type="button" id="btnNew" class="px-4 py-2 rounded-lg bg-[#1a2036] text-white text-sm font-semibold">
        + Novo serviço
      </button>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 border-b text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3">Nome</th>
              <th class="px-4 py-3">Categoria</th>
              <th class="px-4 py-3">Unidade</th>
              <th class="px-4 py-3 text-right">Builder</th>
              <th class="px-4 py-3 text-right">Cliente final</th>
              <th class="px-4 py-3">Ativo</th>
              <th class="px-4 py-3 text-right">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p id="empty" class="hidden p-8 text-center text-slate-500 text-sm">Nenhum item. Rode a migração do módulo Quotes ou crie um serviço.</p>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/50" aria-modal="true">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6 space-y-4">
      <h2 id="modalTitle" class="text-lg font-bold text-slate-900">Novo serviço</h2>
      <form id="form" class="space-y-3">
        <input type="hidden" id="editId" value="" />
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Nome do serviço *</label>
          <input id="fName" type="text" required maxlength="255" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Ex.: Instalação de LVP — mão de obra" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Categoria *</label>
          <select id="fCategory" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            <option value="Installation">Installation</option>
            <option value="Sand & Finishing">Sand &amp; Finishing</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Unidade *</label>
          <select id="fUnit" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            <option value="sq_ft">Sq Ft (pé quadrado)</option>
            <option value="linear_ft">Linear Ft (pé linear)</option>
            <option value="inches">Inches</option>
            <option value="fixed">Fixed (preço fixo)</option>
          </select>
        </div>
        <div class="border-b border-slate-200 flex gap-1" role="tablist">
          <button type="button" data-catalog-tab="builder" class="catalog-tab px-3 py-2 text-sm font-medium rounded-t-lg border border-b-0 border-slate-200 bg-slate-100 text-slate-900">Builder</button>
          <button type="button" data-catalog-tab="customer" class="catalog-tab px-3 py-2 text-sm font-medium rounded-t-lg border border-transparent text-slate-600 hover:bg-slate-50">Cliente final</button>
        </div>
        <div id="panelBuilder" class="catalog-panel space-y-3 border border-slate-200 rounded-b-lg rounded-tr-lg p-4 bg-slate-50/50">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Preço negociação Builder (USD) *</label>
            <input id="fRateBuilder" type="number" step="0.01" min="0" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white" placeholder="0.00" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Notas Builder (interno)</label>
            <textarea id="fNotesBuilder" rows="2" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white" placeholder="Referência interna; não vai no PDF do cliente"></textarea>
          </div>
        </div>
        <div id="panelCustomer" class="catalog-panel hidden space-y-3 border border-slate-200 rounded-b-lg rounded-tr-lg p-4 bg-slate-50/50">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Preço negociação cliente final (USD) *</label>
            <input id="fRateCustomer" type="number" step="0.01" min="0" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white" placeholder="0.00" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Comentário cliente final (PDF)</label>
            <textarea id="fNotesCustomer" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white" placeholder="Aparece no orçamento final (PDF) por baixo da linha"></textarea>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Descrição padrão (texto da linha no orçamento)</label>
          <textarea id="fDesc" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Texto sugerido ao adicionar do catálogo"></textarea>
        </div>
        <div id="fActiveWrap" class="hidden">
          <label class="inline-flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" id="fActive" checked class="rounded border-slate-300" />
            Ativo (aparece no Quote)
          </label>
        </div>
        <p id="formError" class="text-red-600 text-sm hidden"></p>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="btnCancel" class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium">Cancelar</button>
          <button type="submit" id="btnSubmit" class="px-4 py-2 rounded-lg bg-[#d6b598] text-[#1a2036] text-sm font-bold">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="crm-shared-nav.js"></script>
  <script src="quote-catalog.js?v=2"></script>
</body>
</html>
