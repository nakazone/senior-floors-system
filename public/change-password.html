<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a2036">
    <title>Alterar senha — Senior Floors CRM</title>
    <link rel="icon" type="image/png" href="/assets/SeniorFloors.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="crm-toast.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Nova senha</h1>
                <p id="cpIntro">Por segurança, defina uma nova senha para continuar a utilizar o CRM.</p>
            </div>
            <form id="cpForm" class="login-form">
                <div class="form-group">
                    <label for="currentPassword">Senha atual</label>
                    <input type="password" id="currentPassword" name="currentPassword" required autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="newPassword">Nova senha (mín. 8 caracteres)</label>
                    <input type="password" id="newPassword" name="newPassword" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="newPassword2">Confirmar nova senha</label>
                    <input type="password" id="newPassword2" name="newPassword2" required minlength="8" autocomplete="new-password">
                </div>
                <div id="cpError" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary btn-login-full" id="cpSubmit">Guardar e continuar</button>
            </form>
            <p style="text-align:center;margin-top:1rem;"><a href="/api/auth/logout" onclick="event.preventDefault(); fetch('/api/auth/logout',{method:'POST',credentials:'include'}).then(()=>location.href='/login.html');">Sair</a></p>
        </div>
    </div>
    <script src="crm-toast.js"></script>
    <script>
        fetch('/api/auth/session', { credentials: 'include' })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.authenticated) {
                    window.location.href = '/login.html';
                }
            })
            .catch(function () {
                window.location.href = '/login.html';
            });

        document.getElementById('cpForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            var cur = document.getElementById('currentPassword').value;
            var n1 = document.getElementById('newPassword').value;
            var n2 = document.getElementById('newPassword2').value;
            var err = document.getElementById('cpError');
            var btn = document.getElementById('cpSubmit');
            err.style.display = 'none';
            if (n1.length < 8) {
                err.textContent = 'A nova senha deve ter pelo menos 8 caracteres.';
                err.style.display = 'block';
                return;
            }
            if (n1 !== n2) {
                err.textContent = 'As novas senhas não coincidem.';
                err.style.display = 'block';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'A guardar…';
            try {
                var res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ current_password: cur, new_password: n1 }),
                });
                var j = await res.json().catch(function () { return {}; });
                if (!res.ok) {
                    err.textContent = j.error || j.message || 'Não foi possível alterar.';
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Guardar e continuar';
                    return;
                }
                window.location.href = '/dashboard.html';
            } catch (ex) {
                err.textContent = 'Erro de rede.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Guardar e continuar';
                if (typeof window.crmNotify === 'function') {
                    window.crmNotify('Erro de rede.', 'error');
                }
            }
        });
    </script>
</body>
</html>
