<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Builder Portal</title>
  <link rel="stylesheet" href="css/builders-portal.css" />
</head>
<body class="bp-login-page">
  <div class="bp-login-box">
    <h1>Reset password</h1>
    <p style="color:var(--bp-muted);font-size:14px">Enter your portal email. We will send a reset link if the account exists.</p>
    <form id="forgotForm">
      <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Email</label>
      <input type="email" id="email" required style="width:100%;padding:10px;border:1px solid var(--bp-border);border-radius:8px;margin-bottom:12px;box-sizing:border-box" />
      <p id="forgotMsg" style="font-size:13px;display:none"></p>
      <button type="submit" class="bp-btn-tan" style="width:100%">Send reset link</button>
    </form>
    <p style="margin-top:16px;font-size:13px"><a href="builder-login.html">Back to login</a></p>
  </div>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('forgotMsg');
      msg.style.display = 'block';
      msg.style.color = 'var(--bp-muted)';
      msg.textContent = 'Sending...';
      const r = await fetch('/api/builder-auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
      });
      const j = await r.json();
      msg.style.color = r.ok ? '#16a34a' : '#dc2626';
      msg.textContent = j.message || j.error || 'Request sent';
      e.target.querySelector('button').disabled = true;
    });
  </script>
</body>
</html>
