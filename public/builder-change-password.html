<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change password ť Builder Portal</title>
  <link rel="stylesheet" href="css/builders-portal.css" />
</head>
<body class="bp-page-body" data-bp-page="profile">
  <div class="bp-portal-layout">
    <main class="bp-portal-main" style="max-width:480px;margin:0 auto">
      <div class="bp-main">
        <h1 class="bp-title">Change your password</h1>
        <p id="welcomeMsg" class="bp-muted"></p>
        <form id="chgForm" class="bp-card bp-form-grid">
          <div class="bp-form-full" id="currentWrap">
            <label>Current password</label>
            <input type="password" id="current" />
          </div>
          <div class="bp-form-full"><label>New password (8+)</label><input type="password" id="newpass" required minlength="8" /></div>
          <div class="bp-form-full"><label>Confirm new password</label><input type="password" id="newpass2" required minlength="8" /></div>
          <div class="bp-form-full"><button type="submit" class="bp-btn-tan">Save password</button></div>
        </form>
      </div>
    </main>
  </div>
  <script src="builder-auth.js?v=3"></script>
  <script>
    (async function () {
      if (!window.builderAuth.requireAuth()) return;
      const required = new URLSearchParams(location.search).get('required') === '1';
      const wrap = document.getElementById('currentWrap');
      if (required) {
        wrap.style.display = 'none';
        document.getElementById('welcomeMsg').textContent =
          'Welcome! For security, set a new password before continuing.';
      }
      const me = await window.builderAuth.fetch('/api/builder-auth/me').then((r) => r.json());
      if (me.success && me.data.account_manager) {
        const m = me.data.account_manager;
        document.getElementById('welcomeMsg').textContent +=
          ` Your Senior Floors contact: ${m.name || ''} (${m.email || ''}).`;
      }
      function validatePassword(pw) {
        if (!pw || pw.length < 8) return 'Password must be at least 8 characters';
        if (!/[a-zA-Z]/.test(pw)) return 'Password must include at least one letter';
        if (!/[0-9]/.test(pw)) return 'Password must include at least one number';
        return null;
      }
      document.getElementById('chgForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const np = document.getElementById('newpass').value;
        const pwErr = validatePassword(np);
        if (pwErr) {
          alert(pwErr);
          return;
        }
        if (np !== document.getElementById('newpass2').value) {
          alert('Passwords do not match');
          return;
        }
        const body = required
          ? { new_password: np }
          : { current_password: document.getElementById('current').value, new_password: np };
        const r = await window.builderAuth.fetch('/api/builder-auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const j = await r.json();
        if (!r.ok) {
          alert(j.error || 'Error');
          return;
        }
        location.href = 'builder-portal.html';
      });
    })();
  </script>
</body>
</html>
